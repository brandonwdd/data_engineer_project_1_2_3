apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-bronze-ingest
  namespace: project1-cdc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-bronze-ingest
  template:
    metadata:
      labels:
        app: spark-bronze-ingest
    spec:
      containers:
      - name: spark
        image: project1-spark:latest
        command:
          - spark-submit
          - --master
          - k8s://https://kubernetes.default.svc
          - --deploy-mode
          - cluster
          - --packages
          - org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.4.2,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0
          - --conf
          - spark.kubernetes.container.image=project1-spark:latest
          - /app/streaming/spark/bronze_ingest/ingest_raw_cdc.py
        envFrom:
        - configMapRef:
            name: project1-config
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
