# Kustomize overlay: dev environment
# Overrides: lower resources, local MinIO, debug logging

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../base

namespace: project1-cdc-dev

patchesStrategicMerge:
  - spark-bronze-patch.yaml
  - spark-silver-patch.yaml

configMapGenerator:
  - name: project1-config
    behavior: merge
    literals:
      - ENV=dev
      - LOG_LEVEL=DEBUG
