# Patch: Spark Silver resources (dev)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-silver-merge
spec:
  template:
    spec:
      containers:
      - name: spark
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
