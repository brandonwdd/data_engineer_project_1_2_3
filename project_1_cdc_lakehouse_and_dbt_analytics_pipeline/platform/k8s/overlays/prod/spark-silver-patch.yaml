# Patch: Spark Silver resources (prod)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-silver-merge
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: spark
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
