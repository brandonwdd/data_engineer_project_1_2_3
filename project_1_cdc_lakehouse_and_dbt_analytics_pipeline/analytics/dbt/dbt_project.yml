name: 'project_1'
version: '1.0.0'
config-version: 2

profile: 'project_1'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  project_1:
    +materialized: view
    stg:
      +materialized: table  # REST catalog does not support view, changed to table
      +schema: stg
    int:
      +materialized: table
      +schema: int
    mart:
      +materialized: table
      +schema: mart

seeds:
  project_1:
    +quote_columns: false

tests:
  project_1:
    +store_failures: true
