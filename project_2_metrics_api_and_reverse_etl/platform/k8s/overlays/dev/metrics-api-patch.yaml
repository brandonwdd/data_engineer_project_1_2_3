apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-api
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: metrics-api
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-api-config
data:
  trino-host: "trino-dev"
  trino-port: "8080"
  trino-user: "admin"
  trino-catalog: "iceberg"
  trino-schema: "mart"
