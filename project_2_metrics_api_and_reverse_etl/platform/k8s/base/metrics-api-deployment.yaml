apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-api
  labels:
    app: metrics-api
    component: metrics-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metrics-api
  template:
    metadata:
      labels:
        app: metrics-api
        component: metrics-service
    spec:
      containers:
      - name: metrics-api
        image: metrics-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: TRINO_HOST
          valueFrom:
            configMapKeyRef:
              name: metrics-api-config
              key: trino-host
        - name: TRINO_PORT
          valueFrom:
            configMapKeyRef:
              name: metrics-api-config
              key: trino-port
        - name: TRINO_USER
          valueFrom:
            configMapKeyRef:
              name: metrics-api-config
              key: trino-user
        - name: TRINO_CATALOG
          valueFrom:
            configMapKeyRef:
              name: metrics-api-config
              key: trino-catalog
        - name: TRINO_SCHEMA
          valueFrom:
            configMapKeyRef:
              name: metrics-api-config
              key: trino-schema
        - name: QUERY_TIMEOUT_SECONDS
          value: "30"
        - name: CACHE_TTL_SECONDS
          value: "300"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: metrics-api
  labels:
    app: metrics-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: metrics-api

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-api-config
data:
  trino-host: "trino"
  trino-port: "8080"
  trino-user: "admin"
  trino-catalog: "iceberg"
  trino-schema: "mart"
