# Use env vars so Airflow (Docker) can use TRINO_HOST=trino, TRINO_SCHEMA=mart_mart
project_2:
  outputs:
    trino:
      type: trino
      method: none
      host: "{{ env_var('TRINO_HOST', 'localhost') }}"
      port: "{{ env_var('TRINO_PORT', '8080') | int }}"
      user: "{{ env_var('TRINO_USER', 'admin') }}"
      password: ""
      catalog: "{{ env_var('TRINO_CATALOG', 'iceberg') }}"
      schema: "{{ env_var('TRINO_SCHEMA', 'mart') }}"
      threads: 1
      http_scheme: http
  target: trino
